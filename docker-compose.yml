version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: proctor_mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: proctoring_system
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: proctor_flask_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_PORT=3306
      - DB_NAME=proctoring_system
      - SECRET_KEY=prod-secret-key-change-this
      - JWT_SECRET_KEY=prod-jwt-secret-key-change-this
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: proctor_react_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data:
